<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Checkout – Pebble Store</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600&family=Jost:wght@300;400;500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="/style.css"/>
  <style>
    .checkout-page{min-height:100vh;padding:7rem 2rem 4rem;background:var(--cream)}
    .checkout-inner{max-width:900px;margin:0 auto}
    .checkout-title{font-family:'Playfair Display',serif;font-size:2rem;color:var(--dark);margin-bottom:2rem}
    .checkout-layout{display:grid;grid-template-columns:1fr 340px;gap:2rem;align-items:start}

    /* STEPS */
    .steps{display:flex;gap:0;margin-bottom:2rem}
    .step{flex:1;text-align:center;padding:0.7rem;font-size:0.72rem;letter-spacing:0.1em;text-transform:uppercase;font-weight:500;color:var(--stone);border-bottom:2px solid rgba(92,61,46,0.15);position:relative}
    .step.active{color:var(--bark);border-bottom-color:var(--bark)}
    .step.done{color:var(--moss);border-bottom-color:var(--moss)}

    /* FORM */
    .checkout-form{background:var(--warm-white);padding:1.8rem}
    .form-section-title{font-family:'Playfair Display',serif;font-size:1.1rem;color:var(--dark);margin-bottom:1.2rem}
    .fg{display:flex;flex-direction:column;gap:0.35rem;margin-bottom:1rem}
    .fg label{font-size:0.68rem;letter-spacing:0.1em;text-transform:uppercase;color:var(--stone);font-weight:500}
    .fg input,.fg select,.fg textarea{font-family:'Jost',sans-serif;font-size:0.92rem;padding:0.75rem 1rem;border:1.5px solid rgba(92,61,46,0.2);background:var(--cream);color:var(--dark);outline:none;border-radius:0;width:100%;transition:border-color 0.2s}
    .fg input:focus,.fg select:focus,.fg textarea:focus{border-color:var(--clay)}
    .fg textarea{resize:vertical;min-height:70px}
    .form-row{display:grid;grid-template-columns:1fr 1fr;gap:1rem}

    /* ORDER SUMMARY SIDEBAR */
    .checkout-summary{background:var(--warm-white);padding:1.5rem;position:sticky;top:7rem}
    .summary-title{font-family:'Playfair Display',serif;font-size:1rem;color:var(--dark);margin-bottom:1rem;padding-bottom:0.6rem;border-bottom:1px solid rgba(92,61,46,0.1)}
    .summary-item{display:flex;justify-content:space-between;align-items:center;padding:0.5rem 0;border-bottom:1px solid rgba(92,61,46,0.06);font-size:0.85rem}
    .summary-item:last-of-type{border-bottom:none}
    .summary-item-name{color:var(--dark);font-weight:500}
    .summary-item-qty{color:var(--stone);font-size:0.78rem;margin-top:0.1rem}
    .summary-item-price{color:var(--moss);font-weight:600;white-space:nowrap}
    .summary-divider{height:1px;background:rgba(92,61,46,0.12);margin:0.8rem 0}
    .summary-row{display:flex;justify-content:space-between;font-size:0.85rem;color:var(--light-text);margin-bottom:0.5rem}
    .summary-total{display:flex;justify-content:space-between;font-size:1rem;font-weight:600;color:var(--dark);margin-top:0.8rem;padding-top:0.8rem;border-top:1.5px solid rgba(92,61,46,0.15)}
    .summary-total span:last-child{color:var(--moss);font-family:'Playfair Display',serif;font-size:1.1rem}

    /* PAYMENT OPTIONS */
    .payment-options{display:flex;flex-direction:column;gap:0.8rem;margin-bottom:1.5rem}
    .payment-option{display:flex;align-items:center;gap:0.8rem;padding:1rem 1.2rem;border:1.5px solid rgba(92,61,46,0.2);background:var(--cream);cursor:pointer;transition:border-color 0.2s}
    .payment-option:hover{border-color:var(--bark)}
    .payment-option.selected{border-color:var(--bark);background:rgba(92,61,46,0.04)}
    .payment-option input[type=radio]{accent-color:var(--bark);width:16px;height:16px;flex-shrink:0}
    .payment-option-label{font-size:0.88rem;font-weight:500;color:var(--dark)}
    .payment-option-desc{font-size:0.75rem;color:var(--light-text);margin-top:0.15rem}
    .paytm-logo{font-size:0.75rem;font-weight:700;color:#002970;background:#00baf2;padding:0.15rem 0.5rem;border-radius:2px;margin-left:auto}

    /* PLACE ORDER BUTTON */
    .place-order-btn{width:100%;padding:1.1rem;background:var(--bark);color:var(--cream);border:none;font-family:'Jost',sans-serif;font-size:0.88rem;letter-spacing:0.12em;text-transform:uppercase;font-weight:500;cursor:pointer;transition:background 0.2s;margin-top:0.5rem}
    .place-order-btn:hover{background:var(--dark)}
    .place-order-btn:disabled{opacity:0.6;cursor:not-allowed}
    .error-msg{color:#c0392b;font-size:0.82rem;padding:0.6rem 0.8rem;background:#fde8e8;margin-bottom:1rem;display:none}

    /* SUCCESS */
    .success-page{text-align:center;padding:3rem 1rem;max-width:560px;margin:0 auto}
    .success-icon{font-size:4rem;margin-bottom:1rem;animation:popIn 0.5s ease}
    @keyframes popIn{from{transform:scale(0.5);opacity:0}to{transform:scale(1);opacity:1}}
    .success-title{font-family:'Playfair Display',serif;font-size:2rem;color:var(--dark);margin-bottom:0.5rem}
    .success-sub{color:var(--light-text);font-size:0.95rem;margin-bottom:2rem;line-height:1.7;font-weight:300}
    .success-box{background:var(--warm-white);padding:1.5rem;text-align:left;margin-bottom:1.5rem}
    .success-box-title{font-size:0.68rem;letter-spacing:0.12em;text-transform:uppercase;color:var(--stone);font-weight:500;margin-bottom:0.8rem}
    .success-row{display:flex;justify-content:space-between;font-size:0.88rem;padding:0.4rem 0;border-bottom:1px solid rgba(92,61,46,0.06)}
    .success-row:last-child{border-bottom:none}
    .success-steps{display:flex;flex-direction:column;gap:0.7rem;text-align:left;background:rgba(74,92,58,0.06);border-left:3px solid var(--moss);padding:1rem 1.2rem;margin-bottom:1.5rem}
    .success-step{display:flex;align-items:flex-start;gap:0.7rem;font-size:0.85rem;color:var(--text);line-height:1.5}
    .step-num{width:20px;height:20px;min-width:20px;border-radius:50%;background:var(--moss);color:white;font-size:0.68rem;font-weight:600;display:flex;align-items:center;justify-content:center}

    @media(max-width:768px){
      .checkout-layout{grid-template-columns:1fr}
      .checkout-summary{position:static}
      .form-row{grid-template-columns:1fr}
      .checkout-page{padding:6rem 1rem 4rem}
    }
  </style>
</head>
<body>
  <nav>
    <a class="nav-logo" href="/"><img src="/images/logo.png" alt="Pebble Store" style="height:80px;object-fit:contain;vertical-align:middle"/></a>
    <ul class="nav-links">
      <li><a href="/">Shop</a></li>
      <li><a href="/cart.html">Cart</a></li>
      <li><a href="/track.html">Track</a></li>
    </ul>
  </nav>

  <div class="checkout-page">
    <div class="checkout-inner" id="checkoutMain">
      <h1 class="checkout-title">Checkout</h1>
      <div id="checkoutContent">Loading…</div>
    </div>
  </div>

  <footer>
    <div class="footer-logo"><img src="/images/logo.png" alt="Pebble Store" style="height:70px;object-fit:contain;filter:brightness(0) invert(1);opacity:0.85"/></div>
    <div class="footer-links">
      <a href="/">Shop</a><a href="/cart.html">Cart</a><a href="/track.html">Track</a>
    </div>
    <div class="footer-links" style="margin-top:0.8rem;font-size:0.72rem;opacity:0.7">
      <a href="/privacy.html">Privacy Policy</a>
      <a href="/terms.html">Terms & Conditions</a>
      <a href="/shipping.html">Shipping Policy</a>
      <a href="/refund.html">Refund Policy</a>
    </div>
    <p class="footer-copy" style="margin-top:1rem">© 2025 Pebble Store · Made with 🌿 and lots of love</p>
  </footer>

  <!-- Razorpay SDK -->
  <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
  <script>
    window.addEventListener('load', function() {
      const checked = document.querySelector('input[name="payment"]:checked');
      const info = document.createElement('div');
      info.style.cssText = 'position:fixed;bottom:10px;left:10px;background:#c0392b;color:white;padding:8px 12px;font-size:12px;z-index:9999;border-radius:4px;max-width:300px';
      info.innerHTML = 'Payment: <b>' + (checked ? checked.value : 'NONE') + '</b><br>Razorpay SDK: <b>' + (window.Razorpay ? 'YES' : 'NO') + '</b>';
      document.body.appendChild(info);
    });
  </script>

  <script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
    import { getFirestore, collection, getDocs, addDoc } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

    const firebaseConfig = {
      apiKey: "AIzaSyA-tA1L4XZk644INv5Hu2_iySOjVMkzpPo",
      authDomain: "pebble-store-70889.firebaseapp.com",
      projectId: "pebble-store-70889",
      storageBucket: "pebble-store-70889.firebasestorage.app",
      messagingSenderId: "611731436877",
      appId: "1:611731436877:web:eee0ef64cd8b4b86467304"
    };

    const app = initializeApp(firebaseConfig);
    const db  = getFirestore(app);

    let cart = JSON.parse(localStorage.getItem('pebble_cart') || '{}');
    let allProducts = [];
    let cartItems = [];
    let cartTotal = 0;

    async function init() {
      // Handle Paytm callback FIRST before anything else
      const urlParams = new URLSearchParams(window.location.search);
      const cbStatus  = urlParams.get('status');
      const cbMsg     = decodeURIComponent(urlParams.get('msg') || '');

      if (cbStatus === 'success') {
        localStorage.removeItem('pebble_cart');
        document.getElementById('checkoutMain').innerHTML = '';
        showSuccess({}, 'paytm', true);
        return;
      }

      if (cbStatus === 'failed') {
        document.getElementById('checkoutMain').innerHTML = '';
        showPaymentFailed(cbMsg);
        return;
      }

      const items = Object.entries(cart).filter(([, q]) => q > 0);
      if (!items.length) { window.location.href = '/cart.html'; return; }

      const snap = await getDocs(collection(db, 'products'));
      allProducts = snap.docs.map(d => ({ id: d.id, ...d.data() }));

      cartItems = items.map(([id, qty]) => {
        const p = allProducts.find(x => x.id === id);
        return p ? { id, name: p.name, price: p.price, qty, subtotal: p.price * qty } : null;
      }).filter(Boolean);

      cartTotal = cartItems.reduce((s, i) => s + i.subtotal, 0);
      renderCheckout();
    }

    function renderCheckout() {
      const summaryItems = cartItems.map(i => `
        <div class="summary-item">
          <div>
            <div class="summary-item-name">${i.name}</div>
            <div class="summary-item-qty">× ${i.qty}</div>
          </div>
          <div class="summary-item-price">₹${i.subtotal}</div>
        </div>`).join('');

      document.getElementById('checkoutContent').innerHTML = `
        <div class="checkout-layout">

          <!-- FORM -->
          <div>
            <div class="checkout-form">
              <div class="form-section-title">Delivery Details</div>
              <div class="error-msg" id="errorMsg"></div>

              <div class="form-row">
                <div class="fg"><label>Full Name *</label><input id="custName" placeholder="Your name"/></div>
                <div class="fg"><label>Phone *</label><input id="custPhone" type="tel" placeholder="+91 00000 00000"/></div>
              </div>
              <div class="fg"><label>Email Address</label><input id="custEmail" type="email" placeholder="your@email.com"/></div>
              <div class="fg"><label>Delivery Address *</label><textarea id="custAddress" placeholder="House no, street, area, city, state, pincode"></textarea></div>
              <div class="fg"><label>Special Notes</label><input id="custNotes" placeholder="Gifting notes, allergies, etc."/></div>

              <div style="height:1px;background:rgba(92,61,46,0.1);margin:1.5rem 0"></div>
              <div class="form-section-title">Payment Method</div>

              <div class="payment-options">
                <label class="payment-option selected" id="opt-razorpay">
                  <input type="radio" name="payment" value="razorpay" checked onchange="selectPayment(this)"/>
                  <div>
                    <div class="payment-option-label">Pay Online <span style="font-size:0.72rem;font-weight:700;color:#2D6DEB;background:#EEF3FF;padding:0.15rem 0.5rem;border-radius:2px;margin-left:0.3rem">Razorpay</span></div>
                    <div class="payment-option-desc">UPI, Cards, Net Banking, Wallets</div>
                  </div>
                </label>
                <label class="payment-option" id="opt-whatsapp">
                  <input type="radio" name="payment" value="whatsapp" onchange="selectPayment(this)"/>
                  <div>
                    <div class="payment-option-label">💬 Order via WhatsApp</div>
                    <div class="payment-option-desc">We'll share payment details on WhatsApp</div>
                  </div>
                </label>
                <label class="payment-option" id="opt-later">
                  <input type="radio" name="payment" value="later" onchange="selectPayment(this)"/>
                  <div>
                    <div class="payment-option-label">Pay Later / Cash</div>
                    <div class="payment-option-desc">We'll confirm and collect payment separately</div>
                  </div>
                </label>
              </div>

              <button class="place-order-btn" id="placeOrderBtn" onclick="placeOrder()">Place Order →</button>
            </div>
          </div>

          <!-- SUMMARY -->
          <div class="checkout-summary">
            <div class="summary-title">Order Summary</div>
            ${summaryItems}
            <div class="summary-divider"></div>
            <div class="summary-row"><span>Subtotal</span><span>₹${cartTotal}</span></div>
            <div class="summary-row"><span>Shipping</span><span>To be confirmed</span></div>
            <div class="summary-total"><span>Total</span><span>₹${cartTotal}</span></div>
            <p style="font-size:0.72rem;color:var(--stone);margin-top:0.8rem;line-height:1.5">🌿 Handmade to order · Dispatched in 1-2 days · Tamil Nadu: 3-5 days · India: 5-7 days</p>
          </div>

        </div>`;
    }

    window.selectPayment = (radio) => {
      document.querySelectorAll('.payment-option').forEach(o => o.classList.remove('selected'));
      radio.closest('.payment-option').classList.add('selected');
      const method = radio.value;
      const btn = document.getElementById('placeOrderBtn');
      if (method === 'razorpay') btn.textContent = 'Pay Now →';
      else if (method === 'whatsapp') btn.textContent = 'Order via WhatsApp →';
      else btn.textContent = 'Place Order →';
    };

    function getFormData() {
      return {
        name:    document.getElementById('custName').value.trim(),
        phone:   document.getElementById('custPhone').value.trim(),
        email:   document.getElementById('custEmail').value.trim(),
        address: document.getElementById('custAddress').value.trim(),
        notes:   document.getElementById('custNotes').value.trim(),
      };
    }

    function validate(data) {
      const err = document.getElementById('errorMsg');
      if (!data.name || !data.phone || !data.address) {
        err.textContent = '⚠️ Please fill in your name, phone and address.';
        err.style.display = 'block';
        err.scrollIntoView({ behavior: 'smooth', block: 'center' });
        return false;
      }
      err.style.display = 'none';
      return true;
    }

    async function saveOrderToFirestore(data, paymentMethod, status = 'new', paid = false) {
      const orderId = 'ORD-' + Date.now();
      // Sequential order number = highest existing orderNo + 1 (starts at 1000)
      let orderNo = null;
      try {
        const snap = await getDocs(collection(db, 'orders'));
        let max = 999;
        snap.forEach(d => { const n = d.data().orderNo; if (typeof n === 'number' && n > max) max = n; });
        orderNo = max + 1;
      } catch (e) { console.warn('Order number assignment failed:', e); }
      await addDoc(collection(db, 'orders'), {
        orderId,
        orderNo,
        name:          data.name,
        phone:         data.phone,
        email:         data.email,
        address:       data.address,
        notes:         data.notes,
        items:         cartItems,
        total:         cartTotal,
        paymentMethod,
        status,
        paid,
        source:        'website',
        tracking:      null,
        createdAt:     new Date().toISOString(),
        updatedAt:     new Date().toISOString()
      });
      return orderId;
    }

    window.placeOrder = async () => {
      const data   = getFormData();
      if (!validate(data)) return;
      const method = document.querySelector('input[name="payment"]:checked')?.value;
      const btn    = document.getElementById('placeOrderBtn');
      if (!btn) return;
      btn.disabled = true;
      btn.textContent = 'Processing…';

      try {
        if (method === 'razorpay') {
          let orderId;
          try {
            console.log('Step 1: saving to Firestore');
            orderId = await saveOrderToFirestore(data, 'razorpay', 'payment_pending', false);
            console.log('Step 2: saved, orderId=', orderId);
          } catch(e) {
            alert('FIRESTORE ERROR: ' + e.message);
            throw e;
          }
          localStorage.setItem('pebble_order_id', orderId);
          localStorage.setItem('pebble_customer', JSON.stringify(data));
          try {
            console.log('Step 3: calling Razorpay API');
            await initiateRazorpay(data, orderId);
            console.log('Step 4: form submitted');
          } catch(e) {
            alert('PAYTM API ERROR: ' + e.message);
            throw e;
          }

        } else if (method === 'whatsapp') {
          await saveOrderToFirestore(data, 'whatsapp', 'new', false);
          // Build WhatsApp message
          let msg = `🛒 *New Order – Pebble Store*\n\n*Name:* ${data.name}\n*Phone:* ${data.phone}\n*Address:* ${data.address}\n\n*Items:*\n`;
          cartItems.forEach(i => { msg += `• ${i.name} × ${i.qty} = ₹${i.subtotal}\n`; });
          msg += `\n*Total: ₹${cartTotal}*`;
          if (data.notes) msg += `\n*Notes:* ${data.notes}`;
          localStorage.removeItem('pebble_cart');
          window.open(`https://wa.me/918925401892?text=${encodeURIComponent(msg)}`, '_blank');
          showSuccess(data, 'whatsapp');

        } else {
          await saveOrderToFirestore(data, 'pay_later', 'new', false);
          localStorage.removeItem('pebble_cart');
          showSuccess(data, 'later');
        }
      } catch (err) {
        console.error('Order error:', err);
        const errMsg = err?.message || JSON.stringify(err) || 'Unknown error';
        alert('DEBUG ERROR: ' + errMsg);
        const errEl = document.getElementById('errorMsg');
        if (errEl) { errEl.textContent = '⚠️ ' + errMsg; errEl.style.display = 'block'; }
        btn.disabled = false;
        btn.textContent = method === 'razorpay' ? 'Pay Now →' : 'Place Order →';
      }
    };

    async function initiateRazorpay(data, orderId) {
      const res = await fetch('/api/razorpay', {
        method:  'POST',
        headers: { 'Content-Type': 'application/json' },
        body:    JSON.stringify({ orderId, amount: cartTotal.toString() })
      });
      const rzData = await res.json();
      console.log('Razorpay order:', rzData);
      if (!rzData.success || !rzData.razorpayOrderId) {
        throw new Error(rzData.error || 'Payment initiation failed. Please try again.');
      }
      return new Promise((resolve, reject) => {
        const options = {
          key:         rzData.keyId,
          amount:      rzData.amount,
          currency:    rzData.currency,
          name:        'Pebble Store',
          description: 'Handmade Natural Products',
          order_id:    rzData.razorpayOrderId,
          prefill:     { name: data.name, contact: data.phone, email: data.email || '' },
          theme:       { color: '#5c3d2e' },
          handler: function(response) {
            console.log('Payment success:', response);
            localStorage.removeItem('pebble_cart');
            showSuccess(data, 'razorpay', true);
            resolve();
          },
          modal: {
            ondismiss: function() {
              const btn = document.getElementById('placeOrderBtn');
              if (btn) { btn.disabled = false; btn.textContent = 'Pay Now →'; }
              reject(new Error('Payment cancelled by user.'));
            }
          }
        };
        if (!window.Razorpay) { reject(new Error('Razorpay SDK not loaded. Please refresh.')); return; }
        const rzp = new window.Razorpay(options);
        rzp.on('payment.failed', function(resp) {
          reject(new Error(resp.error?.description || 'Payment failed. Please try again.'));
        });
        rzp.open();
      });
    }

    function handlePaytmCallback(params) {
      // Called after Paytm redirect callback
      const status = params.get('STATUS') || params.get('status');
      if (status === 'TXN_SUCCESS') {
        localStorage.removeItem('pebble_cart');
        showSuccess({}, 'paytm', true);
      } else {
        document.getElementById('checkoutContent').innerHTML = `
          <div style="text-align:center;padding:3rem">
            <div style="font-size:3rem;margin-bottom:1rem">❌</div>
            <h2 style="font-family:'Playfair Display',serif;margin-bottom:1rem">Payment Failed</h2>
            <p style="color:var(--light-text);margin-bottom:1.5rem">Your payment was not completed. Your cart is still saved.</p>
            <a href="/cart.html" class="btn" style="display:inline-block;text-decoration:none">← Back to Cart</a>
          </div>`;
      }
    }

    function showSuccess(data, method, paid = false) {
      const methodLabel = method === 'paytm' ? '✅ Paid via Paytm' : method === 'whatsapp' ? '💬 Via WhatsApp' : '⏳ Pay Later';
      document.getElementById('checkoutMain').innerHTML = `
        <div class="success-page">
          <div class="success-icon">🌿</div>
          <h2 class="success-title">Order Placed!</h2>
          <p class="success-sub">Thank you${data.name ? ', ' + data.name : ''}! We'll confirm your order and get back to you within 24 hours.</p>

          <div class="success-box">
            <div class="success-box-title">Order Details</div>
            ${cartItems.map(i => `<div class="success-row"><span>${i.name} × ${i.qty}</span><span>₹${i.subtotal}</span></div>`).join('')}
            <div class="success-row" style="font-weight:600;border-top:1.5px solid rgba(92,61,46,0.15);margin-top:0.5rem;padding-top:0.5rem"><span>Total</span><span style="color:var(--moss)">₹${cartTotal}</span></div>
            <div class="success-row"><span>Payment</span><span>${methodLabel}</span></div>
          </div>

          <div class="success-steps">
            <div class="success-step"><span class="step-num">1</span><span>We review and confirm your order</span></div>
            <div class="success-step"><span class="step-num">2</span><span>Your soaps are freshly handmade</span></div>
            <div class="success-step"><span class="step-num">3</span><span>Dispatched within 1-2 days · Tamil Nadu: 3-5 days · India: 5-7 days</span></div>
          </div>

          <a href="/" class="btn" style="display:inline-block;text-decoration:none">← Continue Shopping</a>
          <a href="/track.html" class="btn btn-outline" style="display:inline-block;text-decoration:none;margin-left:0.8rem">Track Order</a>
        </div>`;
    }

    init();
  </script>
</body>
</html>
